type: train
seed: 666666

model:
  name: "B23TemporalRelayLiteModel"
  version: "dinov3_lora_neighborhood_temporal_relay_lite"

input_size: 512
batch_size: 1
num_clips: 1
num_frames: 5
clip_stride: 1
encoder_chunk: 2
gt_ratio: 1

train_full_video_windows: false
train_max_windows_per_video: 0

train_samples:
  - "./flist/DAVIS-VI_tra_DVI_30.npy"
  - "./flist/DAVIS-VI_tra_CPNET_30.npy"

val_samples:
  - "./flist/DAVIS-VI_val_DVI_20.npy"
  - "./flist/DAVIS-VI_val_CPNET_20.npy"

test_samples:
  - "./flist/DAVIS-VI_val_DVI_20.npy"
  - "./flist/DAVIS-VI_val_CPNET_20.npy"
  - "./flist/DAVIS-VI_val_OPN_20.npy"

augment_prob: 0.30
spatial_augment_prob: 0.30
appearance_augment_prob: 0.20

augmentation:
  random_scale_limit: [-0.2, 0.1]
  same_spatial_transform_for_clip: true

temporal_augment:
  frame_swap:
    enabled: false
    prob: 0.0
  frame_drop:
    enabled: false
    prob: 0.0

amp: true
use_activation_checkpoint: true
grad_accum_steps: 2
num_workers: 4
log_interval: 10

dinov3:
  repo: "./dinov3"
  weights: "./dinov3/dinov3_weight/dinov3_vitl16_pretrain_lvd1689m-8aa4cbdd.pth"
  model_name: "dinov3_vitl16"
  input_size: 512
  patch_size: 16
  output_block: 23
  output_resolution: 32
  feature_dim: 1024
  freeze_backbone: true
  allow_hub_download: false
  query_injection:
    enabled: false

lora:
  enabled: true
  rank: 32
  alpha: 64
  dropout: 0.05
  layers: [16, 17, 18, 19, 20, 21, 22, 23]
  targets: "attn.qkv,attn.proj"

temporal_relay:
  enabled: true
  dim: 256
  local_neighborhood:
    enabled: true
    temporal_radius: 1
    spatial_radius: 1
    spatial_dilation: 1
    include_current_frame: true
    include_current_patch: true
    boundary_mode: "mask"
    num_heads: 8
    qkv_bias: true
    attn_dropout: 0.0
    proj_dropout: 0.0
    ffn_ratio: 1.0
    relative_position_bias: true
    relative_position_type: "learned_3d"
    use_sdpa: true
    token_chunk_size: 256
  global_relay:
    enabled: true
    num_tokens: 2
    num_layers: 1
    num_heads: 8
    ffn_ratio: 1.0
    dropout: 0.0
    temporal_rope: true
    relay_identity_embedding: true
  recurrent_state: false
  fusion: "concat_projection"
  debug_stats: true
  finite_check: false

tfcu:
  version: "neighborhood_temporal_relay_lite"

ccm:
  enabled: false

fgm:
  enabled: false

decoder:
  type: "lite_boundary"
  input_resolution: 32
  in_channels: 256
  stages:
    - {resolution: 64, channels: 96}
    - {resolution: 128, channels: 48}
    - {resolution: 256, channels: 16}
  final_upsample: "bilinear"
  output_512_multichannel: false
  export_features:
    enabled: false
  mask128_head:
    enabled: false
  mask256_head:
    enabled: true
  boundary_head:
    enabled: true
    resolution: 128

loss:
  type: "segmentation"
  bce:
    enabled: true
    weight: 1.0
  dice:
    enabled: true
    weight: 1.0
    smooth: 1.0e-6

aux_loss:
  boundary128:
    enabled: true
    weight: 1.0

optimizer:
  type: "adamw"
  learning_rate: 1.0e-4
  lr_lora: 2.0e-5
  lr_temporal: 1.0e-4
  lr_decoder: 1.0e-4
  weight_decay: 5.0e-2
  betas: [0.9, 0.999]
  eps: 1.0e-8

scheduler:
  type: "cosine"
  warmup_epochs: 2
  min_lr: 5.0e-7

val_full_video: false
val_test_max_clips: 4
val_num_workers: 0

test_full_video: true
test_max_clips: 9999

validation:
  original_resolution: false
  full_video: false
  max_batches: 2
  test_max_clips: 4
  rank0_only: false

inference:
  original_resolution: true
  tile_size: 512
  tile_stride: 384
  tile_batch_size: 1
  blending: "hann"
  hann_min_weight: 1.0e-3
  clip_stride: 2
  average_overlapping_logits: true
  pad_mode: "replicate"

train:
  n_epochs: 2000
  save_dir: "runs/b23_temporal_relay_lite"
  val_interval: 10
  max_grad_norm: 1.0
  skip_nonfinite: true

checkpoint:
  save_trainable_only: true
  save_optimizer: true
  save_scheduler: true

ema:
  enabled: false

stability:
  logit_clamp: 30.0
  nan_to_num: true

ddp:
  auto_torchrun: true
  cuda_visible_devices: "4,5,6,7"
  nproc_per_node: 4
  dist_backend: "nccl"
  timeout_minutes: 120
  find_unused_parameters: false
  pytorch_cuda_alloc_conf: "expandable_segments:True"
  torchrun_log_dir: "runs/b23_temporal_relay_lite/torchrun_logs"
  torchrun_tee: ""

debug:
  log_shapes: true
  log_temporal_relay_stats: true
  max_train_steps: 0
